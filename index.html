<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifqyFlow Ultra - Ultimate Content Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(31, 41, 55, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Loader Animation */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center p-4 selection:bg-blue-500 selection:text-white">

    <header class="text-center mb-8 w-full max-w-3xl mt-8">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 mb-2 tracking-tight">
            RifqyFlow Ultra
        </h1>
        <p class="text-gray-400 text-sm font-medium">Advanced Network Routing & AI Media Extractor</p>
        
        <div class="mt-4 inline-flex items-center bg-gray-900 px-4 py-1.5 rounded-full text-xs font-semibold border border-gray-700 shadow-inner">
            <span id="network-indicator" class="w-2.5 h-2.5 rounded-full bg-green-500 mr-2 animate-pulse"></span>
            <span id="api-status" class="text-gray-300">System Ready | Menunggu Link</span>
        </div>
    </header>

    <main class="glass-panel rounded-2xl shadow-2xl p-6 md:p-8 w-full max-w-3xl">
        
        <div class="relative mb-6 group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <i class="fa-brands fa-tiktok text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
            </div>
            <input type="text" id="tiktok-url" class="bg-gray-900 border border-gray-700 text-white text-base rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent block w-full pl-12 p-4 transition-all" placeholder="Tempel URL TikTok di sini...">
            <button onclick="pasteFromClipboard()" class="absolute inset-y-0 right-2 my-2 px-4 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition-colors border border-gray-700">
                <i class="fa-solid fa-paste"></i>
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8 bg-gray-900/50 p-4 rounded-xl border border-gray-800">
            <div>
                <label class="block mb-2 text-xs font-bold text-gray-400 uppercase tracking-wider">Target Quality</label>
                <select id="quality-selector" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 block w-full p-2.5">
                    <option value="auto">🌟 Auto-Detect (Best Available)</option>
                    <option value="hd">🎬 Ultra HD (No Watermark)</option>
                    <option value="audio">🎵 Extract Audio (MP3)</option>
                </select>
            </div>
            <div class="flex flex-col space-y-3 justify-center">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">AI Processing (Server-Side)</label>
                <label class="relative inline-flex items-center cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
                    <input type="checkbox" class="sr-only peer">
                    <div class="w-9 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                    <span class="ml-3 text-sm font-medium"><i class="fa-solid fa-closed-captioning text-blue-400 w-4"></i> Auto-Subtitle (.srt)</span>
                </label>
                <label class="relative inline-flex items-center cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
                    <input type="checkbox" class="sr-only peer">
                    <div class="w-9 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-purple-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                    <span class="ml-3 text-sm font-medium"><i class="fa-solid fa-cloud text-purple-400 w-4"></i> Sync to Cloud Drive</span>
                </label>
            </div>
        </div>

        <button id="extract-btn" onclick="processURL()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg shadow-blue-500/30 transform transition-all flex justify-center items-center gap-2">
            <i class="fa-solid fa-microchip"></i> Ekstrak Metadata & Media
        </button>
    </main>

    <section id="result-section" class="hidden glass-panel rounded-2xl shadow-xl p-6 mt-6 w-full max-w-3xl border border-blue-500/30">
        <div class="flex flex-col md:flex-row gap-6">
            <div class="w-full md:w-1/3 relative group rounded-xl overflow-hidden border border-gray-700 bg-gray-900 aspect-[9/16]">
                <img id="res-thumb" src="" alt="Thumbnail" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                <a id="res-play" href="#" target="_blank" class="absolute inset-0 flex items-center justify-center bg-black/40 hover:bg-black/20 transition-all">
                    <div class="bg-blue-600/80 p-4 rounded-full backdrop-blur-sm">
                        <i class="fa-solid fa-play text-2xl text-white ml-1"></i>
                    </div>
                </a>
            </div>
            
            <div class="w-full md:w-2/3 flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-3 mb-3 pb-3 border-b border-gray-800">
                        <img id="res-avatar" src="" class="w-10 h-10 rounded-full border-2 border-blue-500">
                        <div>
                            <p id="res-author" class="font-bold text-white leading-tight"></p>
                            <p id="res-username" class="text-xs text-gray-400"></p>
                        </div>
                    </div>
                    
                    <div class="bg-gray-900 p-3 rounded-lg border border-gray-800 relative mb-4 group">
                        <p id="res-desc" class="text-sm text-gray-300 pr-8 line-clamp-4 leading-relaxed"></p>
                        <button onclick="copyDesc()" class="absolute top-2 right-2 p-2 bg-gray-800 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 transition-colors" title="Salin Deskripsi">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <a id="btn-dl-hd" href="#" target="_blank" class="col-span-2 bg-blue-600 hover:bg-blue-500 text-center text-white text-sm font-bold py-3 rounded-xl transition-colors flex justify-center items-center gap-2">
                        <i class="fa-solid fa-download"></i> Download HD (No Watermark)
                    </a>
                    <a id="btn-dl-audio" href="#" target="_blank" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-center text-white text-sm font-medium py-2.5 rounded-xl transition-colors">
                        <i class="fa-solid fa-music mr-1"></i> MP3
                    </a>
                    <button class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-center text-white text-sm font-medium py-2.5 rounded-xl transition-colors opacity-70 cursor-not-allowed" title="Membutuhkan Backend Server">
                        <i class="fa-solid fa-scissors mr-1"></i> Trimmer (Pro)
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Sistem Routing API Fallback (Real Endpoints)
        // Catatan: API publik bisa down sewaktu-waktu, sistem ini akan mencoba dari urutan pertama.
        const apiPool = [
            { name: "TikWM Primary", url: "https://www.tikwm.com/api/?url=" },
            { name: "TiklyDown Fallback", url: "https://api.tiklydown.eu.org/api/download?url=" }
            // Tambahkan API lain di sini jika kamu punya endpoint khusus/premium
        ];

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('tiktok-url').value = text;
            } catch (err) {
                alert('Izin clipboard ditolak browser. Silakan paste manual.');
            }
        }

        function updateStatus(message, type = 'info') {
            const status = document.getElementById('api-status');
            const indicator = document.getElementById('network-indicator');
            status.innerText = message;
            
            if(type === 'loading') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-yellow-400 mr-2 animate-pulse";
                status.className = "text-yellow-400 font-medium";
            } else if (type === 'success') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-green-500 mr-2";
                status.className = "text-green-400 font-medium";
            } else if (type === 'error') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-red-500 mr-2";
                status.className = "text-red-400 font-medium";
            }
        }

        async function processURL() {
            const urlInput = document.getElementById('tiktok-url').value.trim();
            if (!urlInput) return alert("Masukkan URL TikTok terlebih dahulu!");

            const btn = document.getElementById('extract-btn');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '<div class="loader mr-2"></div> Memproses Jaringan...';
            btn.disabled = true;

            document.getElementById('result-section').classList.add('hidden');
            let success = false;
            let data = null;

            // Algoritma Fallback Routing
            for (let i = 0; i < apiPool.length; i++) {
                updateStatus(`Routing via Node ${i+1}: ${apiPool[i].name}...`, 'loading');
                
                try {
                    const response = await fetch(apiPool[i].url + encodeURIComponent(urlInput));
                    const result = await response.json();

                    // Standarisasi response karena tiap API punya format JSON berbeda
                    if (apiPool[i].name === "TikWM Primary" && result.code === 0) {
                        data = {
                            title: result.data.title,
                            author: result.data.author.nickname,
                            username: "@" + result.data.author.unique_id,
                            avatar: result.data.author.avatar,
                            cover: result.data.cover,
                            video_hd: result.data.play || result.data.hdplay,
                            audio: result.data.music
                        };
                        success = true;
                        break;
                    } 
                    else if (apiPool[i].name === "TiklyDown Fallback" && result.video) {
                        data = {
                            title: result.title || "Video TikTok",
                            author: result.author.name,
                            username: "@" + result.author.unique_id,
                            avatar: result.author.avatar,
                            cover: result.video.cover,
                            video_hd: result.video.noWatermark,
                            audio: result.music.play_url
                        };
                        success = true;
                        break;
                    }
                } catch (error) {
                    console.warn(`Node ${apiPool[i].name} Timeout/Error. Melakukan lompatan (Failover)...`);
                }
            }

            // Kembalikan tombol
            btn.innerHTML = originalBtnText;
            btn.disabled = false;

            if (success && data) {
                updateStatus('Ekstraksi Berhasil. Koneksi Stabil.', 'success');
                displayResults(data);
            } else {
                updateStatus('Semua Node API Gagal merespon.', 'error');
                alert("Gagal mengambil data. Pastikan URL valid, video tidak diprivate, atau server API sedang mengalami limitasi. Coba beberapa saat lagi.");
            }
        }

        function displayResults(data) {
            // Inject data ke UI
            document.getElementById('res-thumb').src = data.cover;
            document.getElementById('res-avatar').src = data.avatar;
            document.getElementById('res-author').innerText = data.author;
            document.getElementById('res-username').innerText = data.username;
            document.getElementById('res-desc').innerText = data.title;
            
            // Set Link Download
            document.getElementById('res-play').href = data.video_hd;
            document.getElementById('btn-dl-hd').href = data.video_hd;
            document.getElementById('btn-dl-audio').href = data.audio;

            // Tampilkan Section
            document.getElementById('result-section').classList.remove('hidden');
        }

        function copyDesc() {
            const text = document.getElementById('res-desc').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Deskripsi berhasil disalin ke clipboard!");
            });
        }
    </script>
</body>
</html>
