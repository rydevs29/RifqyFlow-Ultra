<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifqyFlow Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6">

    <main class="w-full max-w-2xl bg-[#18181b] rounded-2xl border border-[#27272a] p-6 sm:p-10 shadow-2xl">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-bold tracking-tight mb-2">RifqyFlow Ultra</h1>
            <p class="text-[#a1a1aa] text-sm">Media Extractor. Fast & Minimal.</p>
        </div>

        <div class="flex flex-col gap-4 mb-8">
            <input type="url" id="url-input" class="w-full bg-[#09090b] border border-[#3f3f46] rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-white transition-colors placeholder-[#71717a]" placeholder="Paste TikTok URL here...">
            <button id="fetch-btn" onclick="fetchMedia()" class="w-full bg-white text-black font-semibold rounded-xl py-4 text-sm hover:bg-gray-200 transition-colors flex items-center justify-center gap-2">
                Extract Media
            </button>
        </div>

        <div id="error-msg" class="hidden text-red-400 text-sm text-center mb-4 bg-red-400/10 py-3 rounded-lg border border-red-400/20"></div>

        <div id="result-container" class="hidden mt-8 border-t border-[#27272a] pt-8 animate-[fadeIn_0.5s_ease-out]">
            
            <div class="flex items-start gap-4 mb-6">
                <img id="res-avatar" src="" class="w-12 h-12 rounded-full border border-[#3f3f46] object-cover">
                <div>
                    <h3 id="res-author" class="font-semibold text-base"></h3>
                    <p id="res-desc" class="text-[#a1a1aa] text-sm mt-1 leading-relaxed line-clamp-3"></p>
                </div>
            </div>

            <div id="media-render-area" class="mb-6"></div>

            <a id="btn-audio" href="#" target="_blank" class="block w-full text-center bg-[#27272a] hover:bg-[#3f3f46] border border-[#3f3f46] text-white font-medium rounded-xl py-3.5 text-sm transition-colors mt-4">
                Download Audio (MP3)
            </a>

        </div>
    </main>

    <footer class="mt-12 text-[#71717a] text-xs text-center">
        &copy; 2026 RifqyDev. Hosted on Vercel.
    </footer>

    <script>
        async function fetchMedia() {
            const urlInput = document.getElementById('url-input').value.trim();
            const btn = document.getElementById('fetch-btn');
            const errorMsg = document.getElementById('error-msg');
            const resultContainer = document.getElementById('result-container');
            const mediaArea = document.getElementById('media-render-area');

            if (!urlInput) {
                showError("Link tidak boleh kosong.");
                return;
            }

            // Reset UI State
            errorMsg.classList.add('hidden');
            resultContainer.classList.add('hidden');
            mediaArea.innerHTML = '';
            
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            try {
                // Panggil Serverless API Vercel
                const response = await fetch(`/api/tiktok?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.success) {
                    renderResult(data);
                } else {
                    showError(data.error);
                }
            } catch (err) {
                showError("Terjadi kesalahan jaringan.");
            } finally {
                btn.innerHTML = 'Extract Media';
                btn.disabled = false;
            }
        }

        function renderResult(data) {
            // Set Metadata
            document.getElementById('res-avatar').src = data.meta.avatar;
            document.getElementById('res-author').innerText = data.meta.author;
            document.getElementById('res-desc').innerText = data.meta.title;
            document.getElementById('btn-audio').href = data.media.audio;

            const mediaArea = document.getElementById('media-render-area');

            // LOGIKA AUTO-DETECT VIDEO ATAU FOTO
            if (data.type === 'video') {
                // Render UI Video
                mediaArea.innerHTML = `
                    <div class="w-full bg-black rounded-xl overflow-hidden border border-[#27272a] aspect-[9/16] max-h-[500px] flex justify-center mb-4">
                        <video controls class="h-full w-full object-contain" src="${data.media.video_hd}"></video>
                    </div>
                    <a href="${data.media.video_hd}" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-xl py-3.5 text-sm transition-colors shadow-lg shadow-blue-500/20">
                        Download HD Video
                    </a>
                `;
            } else if (data.type === 'photo') {
                // Render UI Foto (Slideshow Grid)
                let photosHtml = `<div class="flex overflow-x-auto gap-3 pb-4 hide-scrollbar snap-x">`;
                
                data.media.photos.forEach((photoUrl, index) => {
                    photosHtml += `
                        <div class="flex-none w-[200px] sm:w-[250px] snap-center">
                            <img src="${photoUrl}" class="w-full h-auto rounded-lg border border-[#3f3f46] mb-2 object-cover aspect-[3/4]">
                            <a href="${photoUrl}" target="_blank" class="block w-full text-center bg-[#27272a] hover:bg-[#3f3f46] text-white text-xs py-2 rounded-lg transition-colors">
                                Image ${index + 1}
                            </a>
                        </div>
                    `;
                });
                
                photosHtml += `</div>
                <p class="text-xs text-[#a1a1aa] mt-1 text-center">Geser untuk melihat semua foto.</p>`;
                mediaArea.innerHTML = photosHtml;
            }

            document.getElementById('result-container').classList.remove('hidden');
        }

        function showError(msg) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
